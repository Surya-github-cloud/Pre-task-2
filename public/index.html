<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Repository Intelligence Analyzer</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 20px; line-height: 1.6; max-width: 1200px; margin: 0 auto; }
    h1, h2, h3 { color: #333; }
    input { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #f8f9fa; font-weight: 600; }
    tr:nth-child(even) { background-color: #f8f9fa; }
    .error { color: #d32f2f; background: #ffebee; }
    .beginner { background-color: #e8f5e8; }
    .intermediate { background-color: #fff3e0; }
    .advanced { background-color: #ffebee; }
    .loading { text-align: center; padding: 50px; font-size: 18px; color: #666; }
    .readme-section { margin-top: 30px; }
    .readme-card { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .readme-content { background: white; padding: 20px; border-radius: 6px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>GitHub Repository Intelligence Analyzer</h1>
  
  <p><strong>Input:</strong> Enter GitHub repository URLs (comma separated):</p>
  <input type="text" id="repos" placeholder="facebook/facebook-android-sdk, expressjs/express, angular/angular">
  <br>
  <button onclick="analyze()">Analyze Repositories</button>
  <button onclick="analyzeExamples()">Analyze 4 Examples</button>
  
  <div id="output" class="loading">Click button to analyze</div>

  <script>
    async function analyze() {
      const input = document.getElementById('repos').value;
      const repos = input.split(',').map(r => r.trim()).filter(Boolean);
      if (repos.length === 0) return alert('Please enter repositories');
      showLoading();
      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({repos})
        });
        const report = await res.json();
        displayReport(report);
      } catch (e) {
        document.getElementById('output').innerHTML = '<div class="error">Error: ' + e + '</div>';
      }
    }

    async function analyzeExamples() {
      showLoading();
      try {
        const res = await fetch('/examples');
        const report = await res.json();
        displayReport(report);
      } catch (e) {
        document.getElementById('output').innerHTML = '<div class="error">Error: ' + e + '</div>';
      }
    }

    function showLoading() {
      document.getElementById('output').innerHTML = '<div class="loading">Loading...</div>';
    }

    function displayReport(report) {
      let html = '<h2>Structured Report</h2>';
      html += '<p>Generated: ' + new Date(report.timestamp).toLocaleString() + '</p>';
      html += '<p>Summary - Total: ' + report.summary.totalRepos + 
        ' | Beginner: ' + report.summary.beginner + 
        ' | Intermediate: ' + report.summary.intermediate + 
        ' | Advanced: ' + report.summary.advanced + '</p>';
      
      html += '<table>';
      html += '<tr><th>Repository</th><th>Stars</th><th>Forks</th><th>Contributors</th><th>Issues</th><th>PRs</th>';
      html += '<th>Languages</th><th>Activity Score</th><th>Complexity</th><th>Difficulty</th></tr>';
      
      report.details.forEach((item) => {
        const diffClass = item.difficulty ? item.difficulty.toLowerCase() : 'error';
        if (item.error) {
          html += '<tr class="' + diffClass + '"><td colspan="10" class="error">' + item.error + '</td></tr>';
        } else {
          html += '<tr class="' + diffClass + '">';
          html += '<td><a href="https://github.com/' + item.repo + '" target="_blank"><strong>' + item.repo + '</strong></a></td>';
          html += '<td>' + (item.data.stargazers_count || 0) + '</td>';
          html += '<td>' + (item.data.forks_count || 0) + '</td>';
          html += '<td>' + (item.data.contributorsCount || 0) + '</td>';
          html += '<td>' + (item.data.openIssuesCount || 0) + '</td>';
          html += '<td>' + (item.data.openPRCount || 0) + '</td>';
          html += '<td>' + (item.data.languages ? item.data.languages.slice(0,4).join(', ') : 'N/A') + '</td>';
          html += '<td>' + item.activityScore + '</td>';
          html += '<td>' + item.complexityScore + '</td>';
          html += '<td><strong>' + item.difficulty + '</strong></td>';
          html += '</tr>';
          
          // README Preview
          if (item.data.readmeFull || item.data.readmeSummary) {
            html += '<tr><td colspan="10" class="readme-section readme-card">';
            html += '<h3>README - ' + item.repo + '</h3>';
            html += '<div class="readme-content">' + (item.data.readmeFull || item.data.readmeSummary) + '</div>';
            html += '</td></tr>'; 
          }
        }
      });
      
      html += '</table>';
      document.getElementById('output').innerHTML = html;
    }
  </script>
</body>
</html>
