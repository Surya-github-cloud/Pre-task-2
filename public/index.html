<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Repo Analyzer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
    input, button { padding: 10px; margin: 5px; }
    #results { margin-top: 20px; }
    .repo { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .details-section { margin-top: 10px; font-size: 0.9em; }
    .scores { display: flex; gap: 20px; margin: 10px 0; }
    .difficulty { font-weight: bold; padding: 5px 10px; border-radius: 4px; }
    .beginner { background: #d4edda; color: #155724; }
    .intermediate { background: #fff3cd; color: #856404; }
    .advanced { background: #f8d7da; color: #721c24; }
    .metric { display: inline-block; margin: 2px 10px 2px 0; }
  </style>
</head>
<body>
  <h1>GitHub Repository Intelligence Analyzer</h1>
  <p>Enter repo URLs (e.g., c2siorg/Scan8) or click Examples for detailed programmer insights.</p>
  <input type="text" id="reposInput" placeholder="owner/repo1, owner/repo2" style="width: 400px;">
  <button onclick="analyze()">Analyze</button>
  <button onclick="analyzeExamples()">Examples</button>
  <div id="results"></div>

  <script>
    async function analyze() {
      const input = document.getElementById('reposInput').value;
      const repos = input.split(',').map(r => r.trim()).filter(Boolean);
      if (repos.length === 0) return alert('Enter repos');
      try {
        const response = await fetch('/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({repos}) });
        const report = await response.json();
        displayReport(report);
      } catch (e) {
        document.getElementById('results').innerHTML = '<p>Network error.</p>';
      }
    }

    async function analyzeExamples() {
      try {
        const response = await fetch('/examples');
        const report = await response.json();
        displayReport(report);
      } catch (e) {
        document.getElementById('results').innerHTML = '<p>Network error.</p>';
      }
    }

    function displayReport(report) {
      const resultsDiv = document.getElementById('results');
      if (!report || !report.summary) {
        resultsDiv.innerHTML = '<p>Error: Invalid data. Check terminal.</p>';
        return;
      }
      let html = `<h2>Report (${report.timestamp})</h2>
        <p><strong>Summary:</strong> ${report.summary.totalRepos} repos | Analyzed: ${report.summary.analyzed} | Errors: ${report.summary.errors}</p>`;
      
      report.details.forEach(({repo, data, activityScore, complexityScore, difficulty, error}) => {
        if (error) {
          html += `<div class="repo"><strong>❌ ${repo}</strong>: ${error}</div>`;
          return;
        }
        const diffClass = difficulty.toLowerCase();
        html += `
          <div class="repo">
            <h3>${repo}</h3>
            <div class="scores">
              <span>Activity: ${activityScore}/100</span>
              <span>Complexity: ${complexityScore}/10</span>
              <span class="difficulty ${diffClass}">${difficulty}</span>
            </div>
            <div class="details-section">
              <strong>⭐ Stars:</strong> ${data.stargazers_count || 0} | <strong>🍴 Forks:</strong> ${data.forks_count || 0} | <strong>👥 Contributors:</strong> ${data.contributorsCount || 0} | <strong>❗ Open Issues:</strong> ${data.openIssues || 0}<br>
              <strong>📅 Last Commit:</strong> ${data.lastCommit ? new Date(data.lastCommit).toLocaleDateString() : 'N/A'} | <strong>📄 License:</strong> ${data.license || 'None'}<br>
              <strong>🌐 Languages:</strong> ${Array.isArray(data.languages) ? data.languages.join(', ') : data.languages || 'N/A'}<br>
              <strong>📖 README Preview:</strong> ${data.readmeSummary || 'No README'} 
            </div>
          </div>`;
      });
      resultsDiv.innerHTML = html;
    }
  </script>
</body>
</html>
